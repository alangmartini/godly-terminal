<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Godly Terminal Remote</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-card: #161b22;
    --bg-input: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --accent-dim: #1f6feb;
    --danger: #f85149;
    --danger-dim: #da3633;
    --success: #3fb950;
    --warning: #d29922;
    --radius: 12px;
    --touch-min: 48px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* --- Nav --- */
  .nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; gap: 8px;
    padding: 12px 16px;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
  }
  .nav-title { font-size: 16px; font-weight: 600; flex: 1; }
  .nav-back {
    display: none; min-width: var(--touch-min); min-height: var(--touch-min);
    background: none; border: none; color: var(--accent); font-size: 24px;
    cursor: pointer; border-radius: 8px;
  }
  .nav-back:active { background: var(--bg-input); }
  .status-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--danger); flex-shrink: 0;
  }
  .status-dot.connected { background: var(--success); }
  .settings-btn {
    min-width: var(--touch-min); min-height: var(--touch-min);
    background: none; border: none; color: var(--text-dim); font-size: 20px;
    cursor: pointer; border-radius: 8px;
  }
  .settings-btn:active { background: var(--bg-input); }

  /* --- Views --- */
  .view { display: none; padding: 16px; padding-bottom: 80px; }
  .view.active { display: block; }

  /* --- Dashboard --- */
  .section-title {
    font-size: 13px; font-weight: 600; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin: 16px 0 8px; padding: 0 4px;
  }
  .section-title:first-child { margin-top: 0; }

  .alert-card {
    background: var(--bg-card); border: 1px solid var(--warning);
    border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
  }
  .alert-card .alert-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  }
  .alert-badge {
    background: var(--warning); color: #000; font-size: 11px; font-weight: 700;
    padding: 2px 8px; border-radius: 4px; text-transform: uppercase;
  }
  .alert-session { color: var(--text-dim); font-size: 13px; }
  .alert-context {
    font-family: 'SF Mono', 'Cascadia Code', monospace; font-size: 12px;
    color: var(--text); background: var(--bg); border-radius: 6px;
    padding: 8px; margin-bottom: 12px; white-space: pre-wrap;
    max-height: 80px; overflow: auto; line-height: 1.4;
  }
  .alert-actions { display: flex; gap: 8px; }
  .alert-actions button {
    flex: 1; min-height: var(--touch-min); border: none; border-radius: 8px;
    font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .btn-approve { background: var(--success); color: #000; }
  .btn-approve:active { opacity: 0.8; }
  .btn-deny { background: var(--danger-dim); color: #fff; }
  .btn-deny:active { opacity: 0.8; }

  .no-alerts {
    text-align: center; color: var(--text-dim); padding: 24px;
    font-size: 14px;
  }

  .ws-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 12px; overflow: hidden;
  }
  .ws-header {
    padding: 12px 16px; display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  .ws-name { font-weight: 600; font-size: 15px; flex: 1; }
  .ws-shell { font-size: 12px; color: var(--text-dim); }
  .term-row {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 16px; min-height: var(--touch-min);
    border-bottom: 1px solid var(--border); cursor: pointer;
  }
  .term-row:last-child { border-bottom: none; }
  .term-row:active { background: var(--bg-input); }
  .term-status {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .term-status.alive { background: var(--success); }
  .term-status.dead { background: var(--text-dim); }
  .term-name { flex: 1; font-size: 14px; }
  .term-cwd { font-size: 11px; color: var(--text-dim); }
  .term-arrow { color: var(--text-dim); font-size: 16px; }
  .term-idle-badge {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); flex-shrink: 0;
    animation: pulse-idle 1.5s ease-in-out infinite;
  }
  @keyframes pulse-idle {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* --- Session view --- */
  .session-output {
    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    font-size: 12px; line-height: 1.5;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px;
    min-height: 200px; max-height: 60dvh; overflow: auto;
    white-space: pre-wrap; word-break: break-all;
    color: var(--text);
  }
  .input-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bg-card); border-top: 1px solid var(--border);
    padding: 8px 12px; display: none;
  }
  .input-bar.active { display: block; }
  .input-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .input-field {
    flex: 1; min-height: var(--touch-min);
    background: var(--bg-input); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); padding: 0 12px;
    font-family: 'SF Mono', 'Cascadia Code', monospace; font-size: 14px;
  }
  .input-field:focus { outline: none; border-color: var(--accent); }
  .send-btn {
    min-width: var(--touch-min); min-height: var(--touch-min);
    background: var(--accent-dim); color: #fff; border: none;
    border-radius: 8px; font-size: 16px; cursor: pointer;
  }
  .send-btn:active { background: var(--accent); }
  .quick-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .quick-btn {
    min-height: 40px; padding: 0 16px;
    background: var(--bg-input); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 13px;
    font-family: 'SF Mono', 'Cascadia Code', monospace;
    cursor: pointer;
  }
  .quick-btn:active { background: var(--border); }

  /* --- Select Menu Cards --- */
  .menu-card {
    background: var(--bg-card); border: 1px solid var(--accent-dim);
    border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
  }
  .menu-card .alert-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .menu-card .menu-question {
    font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 12px;
  }
  .menu-options { display: flex; flex-direction: column; gap: 6px; }
  .menu-option-btn {
    display: flex; align-items: center; gap: 10px;
    width: 100%; min-height: var(--touch-min); padding: 10px 14px;
    background: var(--bg-input); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px;
    text-align: left; cursor: pointer; transition: border-color 0.15s;
  }
  .menu-option-btn:active { background: var(--border); }
  .menu-option-btn.selected {
    border-color: var(--accent); background: rgba(88, 166, 255, 0.08);
  }
  .menu-option-num {
    min-width: 24px; height: 24px; border-radius: 6px;
    background: var(--bg); display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--text-dim); flex-shrink: 0;
  }
  .menu-option-btn.selected .menu-option-num {
    background: var(--accent-dim); color: #fff;
  }
  .menu-option-label { flex: 1; line-height: 1.3; }

  /* --- Settings --- */
  .settings-group {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 16px;
  }
  .settings-label {
    display: block; font-size: 13px; color: var(--text-dim);
    margin-bottom: 6px;
  }
  .settings-input {
    width: 100%; min-height: var(--touch-min);
    background: var(--bg-input); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); padding: 0 12px;
    font-size: 14px;
  }
  .settings-input:focus { outline: none; border-color: var(--accent); }
  .settings-note { font-size: 12px; color: var(--text-dim); margin-top: 6px; }
  .settings-save {
    width: 100%; min-height: var(--touch-min);
    background: var(--accent-dim); color: #fff; border: none;
    border-radius: 8px; font-size: 15px; font-weight: 600;
    cursor: pointer; margin-top: 8px;
  }
  .settings-save:active { background: var(--accent); }

  /* --- Login --- */
  .login-container {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 70dvh; padding: 32px 16px;
  }
  .login-icon { font-size: 48px; margin-bottom: 16px; }
  .login-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .login-subtitle { font-size: 14px; color: var(--text-dim); margin-bottom: 32px; text-align: center; }
  .login-form { width: 100%; max-width: 320px; }
  .login-form .settings-input { margin-bottom: 12px; text-align: center; font-size: 20px; letter-spacing: 4px; }
  .login-error { color: var(--danger); font-size: 13px; text-align: center; margin-bottom: 12px; min-height: 20px; }
</style>
</head>
<body>

<!-- Nav -->
<div class="nav">
  <button class="nav-back" id="navBack" onclick="goBack()">&#8592;</button>
  <div class="nav-title" id="navTitle">Godly Remote</div>
  <div class="status-dot" id="statusDot" title="Disconnected"></div>
  <button class="settings-btn" id="settingsBtn" onclick="showView('settings')">&#9881;</button>
</div>

<!-- Login -->
<div class="view" id="view-login">
  <div class="login-container">
    <div class="login-icon">&#128274;</div>
    <div class="login-title">Godly Remote</div>
    <div class="login-subtitle">Enter the password shown in your terminal</div>
    <form class="login-form" id="godly-login" action="/api/register-device" method="POST" autocomplete="on"
          onsubmit="event.preventDefault(); submitLogin();">
      <input type="text" name="username" value="Godly Terminal" autocomplete="username" style="display:none">
      <div class="login-error" id="loginError"></div>
      <input class="settings-input" id="loginPassword" name="password" type="password" placeholder="Password"
             autocomplete="current-password" inputmode="text"
             passwordrules="minlength: 16; maxlength: 128; required: upper, lower, digit, special;">
      <button class="settings-save" id="loginBtn" type="submit">Connect</button>
    </form>
  </div>
</div>

<!-- Dashboard -->
<div class="view" id="view-dashboard">
  <div class="section-title">Prompts</div>
  <div id="alertsContainer">
    <div class="no-alerts">No active prompts</div>
  </div>

  <div class="section-title">Workspaces</div>
  <div id="workspacesContainer"></div>
</div>

<!-- Session -->
<div class="view" id="view-session">
  <div class="session-output" id="sessionOutput">Loading...</div>
</div>
<div class="input-bar" id="inputBar">
  <div class="input-row">
    <input class="input-field" id="inputField" type="text" placeholder="Type command..."
           autocapitalize="off" autocorrect="off" spellcheck="false">
    <button class="send-btn" onclick="sendInput()">&#9166;</button>
  </div>
  <div class="quick-actions">
    <button class="quick-btn" onclick="sendQuick('y')">y</button>
    <button class="quick-btn" onclick="sendQuick('n')">n</button>
    <button class="quick-btn" onclick="sendQuick('\r')">Enter</button>
    <button class="quick-btn" onclick="sendArrow('up')">&#9650;</button>
    <button class="quick-btn" onclick="sendArrow('down')">&#9660;</button>
    <button class="quick-btn" onclick="sendEsc()">Esc</button>
    <button class="quick-btn" onclick="sendTab()">Tab</button>
    <button class="quick-btn" onclick="sendCtrlC()">Ctrl+C</button>
  </div>
</div>

<!-- Settings -->
<div class="view" id="view-settings">
  <div class="section-title">Connection</div>
  <div class="settings-group">
    <label class="settings-label">API Key</label>
    <input class="settings-input" id="apiKeyInput" type="password" placeholder="Enter API key">
    <div class="settings-note">Required if server has auth enabled.</div>
    <button class="settings-save" onclick="saveSettings()">Save</button>
  </div>
  <div class="settings-group">
    <label class="settings-label">Server URL</label>
    <input class="settings-input" id="serverUrlInput" type="url" placeholder="http://localhost:3377">
    <div class="settings-note">Leave empty to use current origin.</div>
    <button class="settings-save" onclick="saveSettings()">Save</button>
  </div>
  <div class="settings-group">
    <label class="settings-label">Connection Status</label>
    <div id="connStatus" style="padding:8px 0;font-size:14px;">Checking...</div>
  </div>
</div>

<script>
// --- State ---
let currentView = 'dashboard';
let currentSessionId = null;
let apiKey = localStorage.getItem('godly_api_key') || '';
let serverUrl = localStorage.getItem('godly_server_url') || '';
// Device token is now stored in HttpOnly cookie (set by server).
// Clean up any legacy localStorage token.
localStorage.removeItem('godly_device_token');
let sseSource = null;
let refreshTimer = null;
let sessionRefreshTimer = null;
let activePrompts = new Map(); // session_id -> prompt data
let idleTerminals = new Set(); // session_ids that went idle after output

// --- API ---
function baseUrl() {
  return serverUrl || window.location.origin;
}

function headers() {
  const h = { 'Content-Type': 'application/json' };
  if (apiKey) h['X-API-Key'] = apiKey;
  // Device token is sent automatically via HttpOnly cookie
  return h;
}

async function apiWithCreds(path, opts = {}) {
  const url = baseUrl() + path;
  const resp = await fetch(url, { credentials: 'include', headers: headers(), ...opts });
  if (!resp.ok) {
    const text = await resp.text();
    throw new Error(`${resp.status}: ${text}`);
  }
  return resp.json();
}

async function api(path, opts = {}) {
  const url = baseUrl() + path;
  const resp = await fetch(url, { credentials: 'include', headers: headers(), ...opts });
  if (!resp.ok) {
    const text = await resp.text();
    throw new Error(`${resp.status}: ${text}`);
  }
  return resp.json();
}

async function apiPost(path, body) {
  return api(path, { method: 'POST', body: JSON.stringify(body) });
}

// --- Views ---
function showView(name, title) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  currentView = name;

  const navBack = document.getElementById('navBack');
  const navTitle = document.getElementById('navTitle');
  const inputBar = document.getElementById('inputBar');

  if (name === 'dashboard') {
    navBack.style.display = 'none';
    navTitle.textContent = 'Godly Remote';
    inputBar.classList.remove('active');
  } else {
    navBack.style.display = 'block';
    navTitle.textContent = title || name;
    inputBar.classList.toggle('active', name === 'session');
  }

  if (name === 'session') startSessionRefresh();
  else stopSessionRefresh();

  if (name === 'settings') loadSettings();
}

function goBack() {
  if (currentView === 'session' || currentView === 'settings') {
    showView('dashboard');
  }
}

// --- Dashboard ---
async function refreshDashboard() {
  try {
    const [promptsData, wsData] = await Promise.all([
      api('/api/prompts').catch(() => ({ prompts: [] })),
      api('/api/workspaces').catch(() => ({ workspaces: [] })),
    ]);
    renderAlerts(promptsData.prompts);
    renderWorkspaces(wsData.workspaces);
    setConnected(true);
  } catch (e) {
    setConnected(false);
  }
}

function renderAlerts(prompts) {
  const container = document.getElementById('alertsContainer');
  if (!prompts || prompts.length === 0) {
    container.innerHTML = '<div class="no-alerts">No active prompts</div>';
    return;
  }

  container.innerHTML = prompts.map(p => {
    if (p.prompt_type === 'select_menu' && p.menu_options && p.menu_options.length > 0) {
      return renderMenuCard(p);
    }
    return renderStandardAlert(p);
  }).join('');
}

function renderStandardAlert(p) {
  return `
    <div class="alert-card">
      <div class="alert-header">
        <span class="alert-badge">${escHtml(p.prompt_type)}</span>
        <span class="alert-session">${escHtml(p.session_id.slice(0, 8))}...</span>
      </div>
      <div class="alert-context">${escHtml(truncate(p.context_text, 200))}</div>
      <div class="alert-actions">
        <button class="btn-approve" onclick="sendToSession('${escAttr(p.session_id)}', 'y\\r')">Approve</button>
        <button class="btn-deny" onclick="sendToSession('${escAttr(p.session_id)}', 'n\\r')">Deny</button>
      </div>
    </div>`;
}

function renderMenuCard(p) {
  // Find the currently selected option index
  const selectedIdx = p.menu_options.findIndex(o => o.selected);
  const currentSel = selectedIdx >= 0 ? selectedIdx : 0;

  // Extract question text from context (lines before the first option)
  const lines = (p.context_text || '').split('\n');
  let question = '';
  for (const line of lines) {
    if (/^\s*>?\s*\d+\./.test(line)) break;
    const trimmed = line.trim();
    if (trimmed) question = trimmed;
  }

  const optionButtons = p.menu_options.map((opt, idx) => `
    <button class="menu-option-btn${opt.selected ? ' selected' : ''}"
            onclick="selectMenuOption('${escAttr(p.session_id)}', ${idx}, ${currentSel})">
      <span class="menu-option-num">${idx + 1}</span>
      <span class="menu-option-label">${escHtml(opt.label)}</span>
    </button>
  `).join('');

  return `
    <div class="menu-card">
      <div class="alert-header">
        <span class="alert-badge">Select</span>
        <span class="alert-session">${escHtml(p.session_id.slice(0, 8))}...</span>
      </div>
      ${question ? `<div class="menu-question">${escHtml(question)}</div>` : ''}
      <div class="menu-options">${optionButtons}</div>
    </div>`;
}

function renderWorkspaces(workspaces) {
  const container = document.getElementById('workspacesContainer');
  if (!workspaces || workspaces.length === 0) {
    container.innerHTML = '<div class="no-alerts">No workspaces found</div>';
    return;
  }

  container.innerHTML = workspaces.map(ws => `
    <div class="ws-card">
      <div class="ws-header">
        <span class="ws-name">${escHtml(ws.name)}</span>
        <span class="ws-shell">${escHtml(ws.shell_type)}</span>
      </div>
      ${ws.terminals.map(t => `
        <div class="term-row" onclick="openSession('${escAttr(t.id)}', '${escAttr(t.name)}')">
          <div class="term-status ${t.alive ? 'alive' : 'dead'}"></div>
          <div>
            <div class="term-name">${escHtml(t.name)}</div>
            ${t.cwd ? `<div class="term-cwd">${escHtml(t.cwd)}</div>` : ''}
          </div>
          ${idleTerminals.has(t.id) ? '<div class="term-idle-badge"></div>' : ''}
          <span class="term-arrow">&#8250;</span>
        </div>
      `).join('')}
      ${ws.terminals.length === 0 ? '<div class="term-row"><span class="term-name" style="color:var(--text-dim)">No terminals</span></div>' : ''}
    </div>
  `).join('');
}

// --- Session ---
async function openSession(id, name) {
  currentSessionId = id;
  idleTerminals.delete(id);
  // Reset input state when opening a new session
  const field = document.getElementById('inputField');
  field.disabled = false;
  field.placeholder = 'Type command...';
  showView('session', name || id.slice(0, 8));
  await refreshSession();
}

async function refreshSession() {
  if (!currentSessionId) return;
  try {
    const url = `/api/sessions/${currentSessionId}/text?lines=50`;
    const data = await api(url);
    const output = document.getElementById('sessionOutput');
    output.textContent = (data.lines || []).join('\n') || '(empty)';
    output.scrollTop = output.scrollHeight;

    // Detect session death
    if (data.running === false) {
      const code = data.exit_code != null ? ` (exit code ${data.exit_code})` : '';
      output.textContent += `\n\n--- Session ended${code} ---`;
      output.scrollTop = output.scrollHeight;
      // Disable input and stop polling
      const field = document.getElementById('inputField');
      field.disabled = true;
      field.placeholder = 'Session ended';
      stopSessionRefresh();
    }
  } catch (e) {
    document.getElementById('sessionOutput').textContent = 'Error: ' + e.message;
  }
}

function startSessionRefresh() {
  stopSessionRefresh();
  sessionRefreshTimer = setInterval(refreshSession, 1000);
}

function stopSessionRefresh() {
  if (sessionRefreshTimer) {
    clearInterval(sessionRefreshTimer);
    sessionRefreshTimer = null;
  }
}

async function sendInput() {
  const field = document.getElementById('inputField');
  const text = field.value;
  if (!text || !currentSessionId) return;
  field.value = '';
  await sendToSession(currentSessionId, text + '\r');
}

async function sendQuick(text) {
  if (!currentSessionId) return;
  await sendToSession(currentSessionId, text);
}

async function sendArrow(direction) {
  if (!currentSessionId) return;
  // ANSI escape sequences for arrow keys
  const seq = direction === 'up' ? '\x1b[A' : '\x1b[B';
  await sendToSession(currentSessionId, seq);
}

async function sendEsc() {
  if (!currentSessionId) return;
  await sendToSession(currentSessionId, '\x1b');
}

async function sendTab() {
  if (!currentSessionId) return;
  await sendToSession(currentSessionId, '\t');
}

async function sendCtrlC() {
  if (!currentSessionId) return;
  await sendToSession(currentSessionId, '\x03');
}

async function selectMenuOption(sessionId, targetIndex, currentSelectedIndex) {
  // Calculate the arrow key sequence to reach the target option from the current selection
  const delta = targetIndex - currentSelectedIndex;
  let seq = '';
  if (delta > 0) {
    // Move down
    for (let i = 0; i < delta; i++) seq += '\x1b[B';
  } else if (delta < 0) {
    // Move up
    for (let i = 0; i < Math.abs(delta); i++) seq += '\x1b[A';
  }
  // Press Enter to confirm
  seq += '\r';
  await sendToSession(sessionId, seq);
}

async function sendToSession(sid, text) {
  try {
    await apiPost(`/api/sessions/${sid}/write`, { data: text });
    // Refresh after short delay to see result
    setTimeout(() => {
      if (currentView === 'session') refreshSession();
      else refreshDashboard();
    }, 300);
  } catch (e) {
    console.error('Write failed:', e);
    // Detect dead session errors from daemon
    const msg = e.message || '';
    if (msg.includes('has exited') || msg.includes('not found')) {
      const output = document.getElementById('sessionOutput');
      if (output) {
        output.textContent += '\n\n--- Session ended ---';
        output.scrollTop = output.scrollHeight;
      }
      const field = document.getElementById('inputField');
      field.disabled = true;
      field.placeholder = 'Session ended';
      stopSessionRefresh();
    }
  }
}

// --- SSE ---
async function connectSSE() {
  if (sseSource) { sseSource.close(); sseSource = null; }

  // Get a one-time ticket for SSE auth (avoids putting secrets in EventSource URL)
  let ticketParam = '';
  try {
    const ticketResp = await api('/api/sse-ticket', { method: 'POST' });
    ticketParam = '?ticket=' + encodeURIComponent(ticketResp.ticket);
  } catch (e) {
    console.warn('Failed to get SSE ticket, falling back to legacy auth', e);
    // Legacy fallback: put api_key in URL (less secure, logged by proxies)
    const sseParams = [];
    if (apiKey) sseParams.push('api_key=' + encodeURIComponent(apiKey));
    if (sseParams.length) ticketParam = '?' + sseParams.join('&');
  }

  let url = baseUrl() + '/api/events' + ticketParam;

  try {
    sseSource = new EventSource(url);

    sseSource.addEventListener('prompt_detected', (e) => {
      try {
        const data = JSON.parse(e.data);
        activePrompts.set(data.session_id, data);
        if (currentView === 'dashboard') refreshDashboard();
      } catch {}
    });

    sseSource.addEventListener('prompt_resolved', (e) => {
      try {
        const data = JSON.parse(e.data);
        activePrompts.delete(data.session_id);
        if (currentView === 'dashboard') refreshDashboard();
      } catch {}
    });

    sseSource.addEventListener('terminal_idle', (e) => {
      try {
        const data = JSON.parse(e.data);
        idleTerminals.add(data.session_id);
        // Vibrate phone to alert user
        if (navigator.vibrate) navigator.vibrate(200);
        if (currentView === 'dashboard') refreshDashboard();
      } catch {}
    });

    sseSource.addEventListener('heartbeat', () => {
      setConnected(true);
    });

    sseSource.onopen = () => setConnected(true);
    sseSource.onerror = () => {
      setConnected(false);
      // EventSource auto-reconnects
    };
  } catch (e) {
    setConnected(false);
  }
}

// --- Settings ---
function loadSettings() {
  document.getElementById('apiKeyInput').value = apiKey;
  document.getElementById('serverUrlInput').value = serverUrl;
  updateConnStatus();
}

function saveSettings() {
  apiKey = document.getElementById('apiKeyInput').value.trim();
  serverUrl = document.getElementById('serverUrlInput').value.trim();

  if (apiKey) localStorage.setItem('godly_api_key', apiKey);
  else localStorage.removeItem('godly_api_key');

  if (serverUrl) localStorage.setItem('godly_server_url', serverUrl);
  else localStorage.removeItem('godly_server_url');

  connectSSE();
  updateConnStatus();
  refreshDashboard();
}

async function updateConnStatus() {
  const el = document.getElementById('connStatus');
  try {
    const resp = await fetch(baseUrl() + '/health');
    if (resp.ok) {
      el.textContent = 'Connected to ' + baseUrl();
      el.style.color = 'var(--success)';
    } else {
      el.textContent = 'Server returned ' + resp.status;
      el.style.color = 'var(--danger)';
    }
  } catch (e) {
    el.textContent = 'Cannot reach server';
    el.style.color = 'var(--danger)';
  }
}

// --- Helpers ---
function setConnected(ok) {
  document.getElementById('statusDot').className = 'status-dot' + (ok ? ' connected' : '');
  document.getElementById('statusDot').title = ok ? 'Connected' : 'Disconnected';
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escAttr(s) {
  return escHtml(s).replace(/'/g, '&#39;');
}

function truncate(s, max) {
  if (!s || s.length <= max) return s;
  return s.slice(0, max) + '...';
}

// --- Input handling ---
document.getElementById('inputField').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); sendInput(); }
});

// --- Device Registration ---
async function checkDeviceStatus() {
  try {
    const data = await api('/api/device-status');
    return data;
  } catch { return { locked: false, password_required: false }; }
}

async function tryExistingToken() {
  // Device token is in HttpOnly cookie — just test if it works
  try {
    await api('/api/prompts');
    return true;
  } catch {
    return false;
  }
}

async function registerDevice(password) {
  // Server generates the device token and returns it via Set-Cookie HttpOnly
  const resp = await apiPost('/api/register-device', {
    password: password || undefined
  });
  return resp;
}

function showLoginError(msg) {
  document.getElementById('loginError').textContent = msg;
}

async function submitLogin() {
  const pw = document.getElementById('loginPassword').value;
  if (!pw) { showLoginError('Enter the password from your terminal'); return; }

  document.getElementById('loginBtn').disabled = true;
  document.getElementById('loginBtn').textContent = 'Connecting...';
  showLoginError('');

  try {
    await registerDevice(pw);
    startApp();
  } catch (e) {
    const msg = e.message.includes('already registered')
      ? 'Another device is already registered. Restart the server.'
      : e.message.includes('Too many') ? 'Too many attempts. Wait 5 minutes.'
      : e.message.includes('Invalid password') ? 'Wrong password'
      : 'Connection failed';
    showLoginError(msg);
  } finally {
    document.getElementById('loginBtn').disabled = false;
    document.getElementById('loginBtn').textContent = 'Connect';
  }
}

function startApp() {
  // Hide login, show dashboard
  document.getElementById('view-login').classList.remove('active');
  showView('dashboard');
  refreshDashboard();
  refreshTimer = setInterval(() => {
    if (currentView === 'dashboard') refreshDashboard();
  }, 5000);
  connectSSE();
}

// --- WebAuthn removed ---
// Biometric auth was client-only (no server-side challenge verification),
// providing false security. Removed in security hardening pass.
// TODO: Implement proper server-side WebAuthn with challenge/response verification.

// --- Init ---
(async function init() {
  // Auto-configure API key from URL fragment (e.g. /phone#key=abc123)
  // URL fragments are NOT sent to the server, NOT logged by proxies/ngrok,
  // and NOT included in Referer headers — much safer than query params.
  const hash = window.location.hash.slice(1); // remove #
  if (hash) {
    const fragParams = new URLSearchParams(hash);
    const urlKey = fragParams.get('key');
    if (urlKey) {
      apiKey = urlKey;
      localStorage.setItem('godly_api_key', apiKey);
      // Clean the URL fragment to prevent leaking in browser history
      history.replaceState(null, '', window.location.pathname + window.location.search);
    }
  }
  // Also support legacy query param for backwards compatibility
  const params = new URLSearchParams(window.location.search);
  const queryKey = params.get('key');
  if (queryKey && !apiKey) {
    apiKey = queryKey;
    localStorage.setItem('godly_api_key', apiKey);
    params.delete('key');
    const clean = window.location.pathname + (params.toString() ? '?' + params : '');
    history.replaceState(null, '', clean);
  }

  // Check if we already have a valid device token
  if (await tryExistingToken()) {
    startApp();
    return;
  }

  // Check if password is required
  const status = await checkDeviceStatus();
  if (status.locked) {
    // Another device registered
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-login').classList.add('active');
    showLoginError('Another device is already registered. Restart the server.');
    document.getElementById('loginPassword').style.display = 'none';
    document.getElementById('loginBtn').style.display = 'none';
    return;
  }

  if (status.password_required) {
    // Show login screen
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-login').classList.add('active');
    document.getElementById('loginPassword').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitLogin();
    });
  } else {
    // No password — register directly
    try {
      await registerDevice();
      startApp();
    } catch {
      showLoginError('Registration failed');
    }
  }
})();
</script>
