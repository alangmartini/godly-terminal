name: Build Installer

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-installer:
    # To use a larger runner for faster builds, replace with:
    #   runs-on: windows-latest-xlarge    (16 cores, ~$0.064/min)
    # Requires GitHub Team/Enterprise plan with larger runners enabled.
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          cache-on-failure: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install
        timeout-minutes: 3

      - name: Build installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Godly Terminal v__VERSION__"
          releaseBody: "See the assets below to download and install."
          # Only create a GitHub Release when a version tag is pushed
          releaseDraft: ${{ startsWith(github.ref, 'refs/tags/v') }}
          prerelease: false

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: godly-terminal-installer
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          retention-days: 7
